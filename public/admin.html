<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Strates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #1A1F2B; color: #EDE7DA; }
  nav {
    background: rgba(26,31,43,0.95);
    padding: 18px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .brand { font-size: 1.4rem; font-weight: bold; }
  .section { padding: 48px 40px; }
  h2 { font-size: 1.5rem; margin-bottom: 24px; }
  .card {
    background: #232B3A;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
  }
  .card h3 { font-size: 1.05rem; margin-bottom: 8px; }
  .card p { color: #9C988A; font-size: 0.88rem; }
  .card .meta { font-size: 0.78rem; color: #9C988A; margin-top: 8px; }
  .btn {
    padding: 10px 20px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .btn-valider { background: #4F9595; color: white; }
  .btn-valider:hover { background: #3d7a7a; }
  #message { color: #9C988A; padding: 20px 0; }
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.72rem;
    background: rgba(255,255,255,0.08);
    color: #9C988A;
    margin-bottom: 8px;
  }
  .notif {
    position: fixed;
    bottom: 24px; right: 24px;
    background: #4F9595;
    color: white;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 0.9rem;
    display: none;
    z-index: 200;
  }
  .notif.error { background: #B5482F; }
  #acces-refuse {
    display: none;
    text-align: center;
    padding: 80px 40px;
    color: #9C988A;
  }
</style>
</head>
<body>

<nav>
  <div class="brand">Strates — Admin</div>
  <div>
    <a href="/" style="color:#9C988A;text-decoration:none;font-size:0.9rem;">← Retour au site</a>
  </div>
</nav>

<div id="acces-refuse">
  <h2>Accès refusé</h2>
  <p>Vous devez être administrateur pour accéder à cette page.</p>
</div>

<div id="contenu-admin" style="display:none;">
  <section class="section">
    <h2>Articles en attente de validation</h2>
    <div id="articles-container">
      <p id="message">Chargement...</p>
    </div>
  </section>
</div>

<div class="notif" id="notif"></div>

<script>
const API = 'http://localhost:3000/api';

function afficherNotif(msg, erreur = false) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.className = 'notif' + (erreur ? ' error' : '');
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 3000);
}

const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || 'null');

if (!token || !user || user.role !== 'admin') {
  document.getElementById('acces-refuse').style.display = 'block';
} else {
  document.getElementById('contenu-admin').style.display = 'block';
  chargerArticles();
}

async function chargerArticles() {
  const res = await fetch(API + '/articles/brouillons', {
    headers: { 'authorization': token }
  });
  const articles = await res.json();
  const container = document.getElementById('articles-container');

  if (!articles.length) {
    container.innerHTML = '<p id="message">Aucun article en attente.</p>';
    return;
  }

  container.innerHTML = articles.map(a => `
    <div class="card" id="card-${a.id}">
      <div>
        <div class="badge">Brouillon</div>
        <h3>${a.titre}</h3>
        <p>${a.contenu.substring(0, 150)}...</p>
        <div class="meta">Par ${a.auteur} · ${new Date(a.date_publication).toLocaleDateString('fr-FR')}</div>
      </div>
      <button class="btn btn-valider" onclick="valider(${a.id})">Publier</button>
    </div>
  `).join('');
}

async function valider(id) {
  const res = await fetch(API + '/articles/' + id + '/valider', {
    method: 'PATCH',
    headers: { 'authorization': token }
  });
  if (res.ok) {
    afficherNotif('Article publié avec succès !');
    document.getElementById('card-' + id).remove();
    const container = document.getElementById('articles-container');
    if (!container.children.length) {
      container.innerHTML = '<p id="message">Aucun article en attente.</p>';
    }
  } else {
    afficherNotif('Erreur lors de la publication', true);
  }
}
</script>
</body>
</html>

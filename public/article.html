<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Article — Strates</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #1A1F2B; color: #EDE7DA; }
.nav { padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
.brand { font-size: 1.4rem; font-weight: bold; }
.back { color: #9C988A; text-decoration: none; font-size: 0.9rem; }
.container { max-width: 800px; margin: 60px auto; padding: 0 40px; }
.tag { font-size: 0.72rem; color: #9C988A; text-transform: uppercase; margin-bottom: 16px; }
h1 { font-size: 2rem; margin-bottom: 16px; line-height: 1.3; }
.meta { color: #9C988A; font-size: 0.85rem; margin-bottom: 40px; }
.contenu { font-size: 1.05rem; line-height: 1.8; }
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">Strates</span>
  <a href="/" class="back">← Retour au flux</a>
</nav>
<div class="container">
  <div class="tag">Article</div>
  <h1 id="titre">Chargement...</h1>
  <div class="meta" id="meta"></div>
  <div class="contenu" id="contenu"></div>
</div>
<script>
const API = '/api';
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

async function chargerArticle() {
  const res = await fetch(API + '/articles/' + id);
  const a = await res.json();
  document.title = a.titre + ' — Strates';
  document.getElementById('titre').textContent = a.titre;
  document.getElementById('meta').textContent = 'Par ' + a.auteur + ' · ' + new Date(a.date_publication).toLocaleDateString('fr-FR');
  document.getElementById('contenu').textContent = a.contenu;
}
chargerArticle();
</script>
</body>
</html>
